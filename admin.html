<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración</title>
  <link rel="stylesheet" href="./admin.css">
</head>
<body class="admin-page-body">
  <main class="admin-page">
    <section class="hero">
      <h1>Álbum de Vida</h1>
      <p>Un espacio para guardar los momentos que hacen latir tu corazón</p>
    </section>

    <section class="panel">
      <header class="panel-header">
        <div class="panel-title">
          <span class="icon">*</span>
          <div class="panel-title-text">
            <strong>Nuevo Recuerdo</strong>
            <span>Guarda un momento especial</span>
          </div>
        </div>
        <button id="logoutBtn" type="button">Salir</button>
      </header>

      <form id="uploadForm">
        <label for="personId" class="field-label">Identificador ID</label>
        <input id="personId" type="text" placeholder="El ID debe ser un valor numérico" required>

        <div class="upload-grid">
          <div>
            <label for="mediaFiles" class="field-label">Imagen o video</label>
            <div class="upload-drop">
              <div>
                <div>Arrastra tu recuerdo aquí</div>
                <div style="font-size:0.78rem; margin-top:4px;">o haz clic para buscar</div>
              </div>
              <input id="mediaFiles" type="file" accept="image/*,video/*" multiple required>
            </div>
          </div>

          <div>
            <label for="contentNote" class="field-label">Tu historia</label>
            <div class="text-editor">
              <textarea id="contentNote" placeholder="Escribe lo que este momento significa para ti..."></textarea>
            </div>
            <div class="save-row">
              <button type="submit">Guardar recuerdo</button>
            </div>
          </div>
        </div>

        <p class="hint">Una identificación puede tener múltiples imágenes y videos.</p>
        <p id="uploadMessage" class="success-text"></p>
        <p id="uploadError" class="error-text"></p>
      </form>
    </section>

    <section class="panel admin-card">
      <div class="admin-top">
        <div class="section-title-wrap">
          <h2 class="section-title">Contenido Registrado</h2>
          <span id="itemsCount" class="section-sub">0 elementos</span>
        </div>
      </div>

      <div class="search-row">
        <input id="idSearch" type="text" placeholder="Buscar por ID...">
      </div>

      <div id="adminGallery" class="admin-gallery"></div>
    </section>
  </main>

  <script src="./storage.js"></script>
  <script src="./admin.js"></script>
  <script>
    const idSearch = document.getElementById("idSearch");
    const itemsCount = document.getElementById("itemsCount");
    const galleryNode = document.getElementById("adminGallery");

    function updateItemsCounter() {
      const db = getMediaDatabase();
      const count = Object.values(db).reduce((acc, list) => acc + list.length, 0);
      itemsCount.textContent = `${count} elemento${count === 1 ? "" : "s"}`;
    }

    function filterById() {
      const query = (idSearch.value || "").trim().toLowerCase();
      const blocks = galleryNode.querySelectorAll(".person-block");
      blocks.forEach((block) => {
        const title = block.querySelector(".person-header h3");
        const text = (title?.textContent || "").toLowerCase();
        block.style.display = text.includes(query) ? "" : "none";
      });
    }

    if (typeof renderAdminGallery === "function") {
      const originalRender = renderAdminGallery;
      renderAdminGallery = function wrappedRender() {
        originalRender();
        updateItemsCounter();
        filterById();
      };
      renderAdminGallery();
    }

    idSearch?.addEventListener("input", filterById);
  </script>
</body>
</html>
